# docker-compose.yml
version: '3.8'

services:
  px4-gazebo:
    image: px4io/px4-sim-gazebo-classic:latest
    container_name: px4-gazebo
    # This allows MAVSDK from the agent-app to connect
    ports:
      - "14540:14540/udp"
    environment:
      - PX4_SITL_WORLD=empty # A simple, empty world for testing

  agent-app:
    build: .
    container_name: agent-app
    # Mount the code for live reloading during development
    volumes:
      - ./app:/app
    # Pass the .env file to the container
    env_file:
      - .env
    # This allows the container to resolve host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - px4-gazebo
    # So we can type into the app
    stdin_open: true
    tty: true