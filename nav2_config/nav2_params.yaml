amcl:
  ros__parameters:
    use_sim_time: true
    # Disabled, but Nav2 still expects node names to exist if using default bringup
    enabled: false

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    use_sim_time: true
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0

    # Which controller(s) to load
    controller_plugins: ["FollowPath"]

    # Progress and goal checkers
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"

    # Main DWB controller
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false

      # Velocity limits
      min_vel_x: 0.0
      max_vel_x: 0.5
      min_vel_theta: -1.0
      max_vel_theta: 1.0

      # Acceleration limits
      acc_lim_x: 1.0
      acc_lim_theta: 2.0

      # Sampling parameters
      vx_samples: 20
      vtheta_samples: 40
      sim_time: 2.0

      # DWB critics (required!)
      critics: [
        "RotateToGoal",
        "Oscillation",
        "BaseObstacle",
        "GoalAlign",
        "PathAlign",
        "PathDist",
        "GoalDist"
      ]

      # Critic weighting (tweak later as needed)
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      GoalAlign.scale: 24.0
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0


bt_navigator:
  ros__parameters:
    use_sim_time: true
    default_bt_xml_filename: "navigate_w_replanning_and_recovery.xml"

waypoint_follower:
  ros__parameters:
    use_sim_time: true

behavior_server:
  ros__parameters:
    use_sim_time: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: base_link
      update_frequency: 1.0
      publish_frequency: 1.0
      resolution: 0.05
      track_unknown_space: true
      transform_tolerance: 0.3
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: pointcloud
        pointcloud:
          topic: /points2   # try /cloud_obstacles if needed
          max_obstacle_height: 5.0
          min_obstacle_height: 0.05
          obstacle_range: 10.0
          raytrace_range: 15.0
          clearing: True
          marking: True
          data_type: PointCloud2
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.5

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom_stereo
      robot_base_frame: base_link
      update_frequency: 5.0
      publish_frequency: 2.0
      resolution: 0.05
      rolling_window: true
      width: 10
      height: 10
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: pointcloud
        pointcloud:
          topic: /points2   # or /cloud_obstacles
          max_obstacle_height: 5.0
          min_obstacle_height: 0.05
          obstacle_range: 10.0
          raytrace_range: 15.0
          clearing: True
          marking: True
          data_type: PointCloud2
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.5

collision_monitor:
  ros__parameters:
    use_sim_time: true
    base_frame_id: base_link
    odom_frame_id: odom_stereo
    transform_tolerance: 0.3
    source_timeout: 2.0
    min_points: 3

    observation_sources: ["pointcloud"]
    pointcloud:
      type: pointcloud
      topic: /points2
      obstacle_keep_time: 0.5
      raytrace_range: 15.0
      min_obstacle_height: 0.05
      max_obstacle_height: 5.0
      expected_update_rate: 0.0
      observation_persistence: 0.0

    polygons: ["safety"]

    safety:
      type: polygon
      action_type: stop
      # 👇 Larger in front, shorter in back
      points: [
        [1.0, 0.8],
        [1.0, -0.8],
        [-0.3, -0.8],
        [-0.3, 0.8]
      ]
      min_points: 3
      slowdown_ratio: 0.5
      priority: 1
